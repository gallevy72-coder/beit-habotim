<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>בית הבוטים — קטלוג כלים חינוכיים למורים</title>
<link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;500;600;700;900&family=Rubik:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root{--blue-deep:#2B59C3;--blue-mid:#3B7DDD;--blue-bright:#4A9AF5;--teal:#00BFA6;--teal-light:#26D9C1;--cyan:#00C9DB;--purple:#6C5CE7;--purple-light:#8B7CF6;--grad-main:linear-gradient(135deg,#6C5CE7 0%,#2B59C3 40%,#00BFA6 100%);--grad-header:linear-gradient(135deg,#1E1B4B 0%,#1E3A5F 50%,#0F4C5C 100%);--grad-btn:linear-gradient(135deg,#2B59C3,#00BFA6);--grad-btn-hover:linear-gradient(135deg,#6C5CE7,#4A9AF5);--bg-primary:#F4F7FC;--bg-card:#FFF;--text-primary:#1A1F36;--text-secondary:#525F7F;--text-light:#8898AA;--border:#E3E8F0;--shadow-glow:0 4px 20px rgba(107,92,231,0.2);--radius:16px;--radius-sm:10px}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Heebo',sans-serif;background:var(--bg-primary);color:var(--text-primary);line-height:1.6;min-height:100vh}
.header{background:var(--grad-header);position:sticky;top:0;z-index:100;box-shadow:0 4px 24px rgba(30,27,75,0.25)}
.header::after{content:'';position:absolute;bottom:0;left:0;right:0;height:3px;background:linear-gradient(90deg,#6C5CE7,#4A9AF5,#00BFA6,#00C9DB)}
.header-inner{max-width:1200px;margin:0 auto;padding:16px 24px;display:flex;align-items:center;justify-content:space-between}
.logo{display:flex;align-items:center;gap:14px}
.logo-icon{width:46px;height:46px;background:linear-gradient(135deg,#6C5CE7,#00BFA6);border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:24px;box-shadow:0 4px 12px rgba(107,92,231,0.3)}
.logo-text{font-family:'Rubik',sans-serif;font-weight:700;font-size:23px;color:#fff;letter-spacing:-.5px}
.logo-sub{font-size:12px;color:rgba(255,255,255,0.55);font-weight:400;margin-top:-2px}
.hotam-logo-wrap{display:flex;align-items:center;gap:6px;opacity:0.9;transition:opacity .2s}
.hotam-logo-wrap:hover{opacity:1}
.hotam-logo-wrap svg{width:32px;height:32px}
.hotam-logo{height:34px;filter:brightness(2.2);opacity:0.75;transition:opacity .2s;margin-right:12px;padding-right:12px;border-right:1px solid rgba(255,255,255,0.15)}
.hotam-logo:hover{opacity:0.95}
.hotam-text{font-family:'Rubik',sans-serif;font-weight:700;font-size:16px;color:#fff}
.header-actions{display:flex;align-items:center;gap:10px}
.btn-login{padding:9px 22px;border-radius:100px;font-family:'Heebo',sans-serif;font-size:14px;font-weight:500;cursor:pointer;transition:all .25s;border:1.5px solid rgba(255,255,255,0.25);background:rgba(255,255,255,0.08);color:#fff}
.btn-login:hover{background:rgba(255,255,255,0.15);border-color:#26D9C1}
.btn-admin{padding:9px 18px;border-radius:100px;font-family:'Heebo',sans-serif;font-size:13px;font-weight:500;cursor:pointer;transition:all .25s;border:none;background:rgba(255,255,255,0.08);color:rgba(255,255,255,0.65)}
.btn-admin:hover{background:rgba(255,255,255,0.15);color:#fff}
.btn-submit-link{padding:9px 18px;border-radius:100px;font-family:'Heebo',sans-serif;font-size:13px;font-weight:600;transition:all .25s;border:none;background:var(--grad-btn);color:#fff;text-decoration:none;box-shadow:0 2px 8px rgba(0,191,166,0.25)}
.btn-submit-link:hover{background:var(--grad-btn-hover);box-shadow:var(--shadow-glow)}
.user-badge{display:flex;align-items:center;gap:8px;padding:6px 16px 6px 10px;background:rgba(255,255,255,0.1);border-radius:100px;color:#fff;font-size:14px;border:1px solid rgba(255,255,255,0.1)}
.user-badge .avatar{width:30px;height:30px;border-radius:50%;background:var(--grad-btn);display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700}
.btn-logout{background:none;border:none;color:rgba(255,255,255,0.45);cursor:pointer;font-size:12px;font-family:'Heebo',sans-serif;margin-right:4px}
.btn-logout:hover{color:#26D9C1}
.hero{max-width:1200px;margin:0 auto;padding:52px 24px 20px;text-align:center}
.hero-badge{display:inline-flex;align-items:center;gap:6px;padding:6px 16px;border-radius:100px;background:linear-gradient(135deg,rgba(107,92,231,0.1),rgba(0,191,166,0.1));border:1px solid rgba(107,92,231,0.15);font-size:13px;color:#6C5CE7;font-weight:500;margin-bottom:16px}
.hero h1{font-family:'Rubik',sans-serif;font-size:40px;font-weight:800;background:var(--grad-main);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;margin-bottom:14px}
.hero p{font-size:17px;color:var(--text-secondary);max-width:560px;margin:0 auto 32px;line-height:1.8}
.stats-bar{display:flex;justify-content:center;gap:40px;margin-bottom:8px}
.stat-item{text-align:center}
.stat-num{font-family:'Rubik',sans-serif;font-size:30px;font-weight:700;background:var(--grad-main);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.stat-label{font-size:13px;color:var(--text-light);font-weight:500}
.filters-section{max-width:1200px;margin:0 auto;padding:20px 24px 0}
.filters-group{margin-bottom:12px;text-align:center}
.filters-label{font-size:13px;font-weight:600;color:var(--text-light);margin-bottom:8px;display:block}
.filters-row{display:flex;gap:8px;flex-wrap:wrap;justify-content:center}
.filter-btn{padding:8px 20px;border-radius:100px;border:1.5px solid var(--border);background:#fff;font-family:'Heebo',sans-serif;font-size:14px;font-weight:500;color:var(--text-secondary);cursor:pointer;transition:all .25s}
.filter-btn:hover{border-color:#8B7CF6;color:#6C5CE7}
.filter-btn.active{background:var(--grad-btn);border-color:transparent;color:#fff;box-shadow:var(--shadow-glow)}
.grid-section{max-width:1200px;margin:0 auto;padding:12px 24px 60px}
.apps-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(340px,1fr));gap:20px}
.app-card{background:var(--bg-card);border-radius:var(--radius);border:1px solid var(--border);overflow:hidden;transition:all .35s cubic-bezier(.4,0,.2,1);display:flex;flex-direction:column;position:relative}
.app-card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:var(--grad-main);opacity:0;transition:opacity .3s}
.app-card:hover{box-shadow:0 12px 40px rgba(30,27,75,0.12);transform:translateY(-4px);border-color:rgba(107,92,231,0.3)}
.app-card:hover::before{opacity:1}
.card-top{padding:24px 24px 16px;flex:1}
.card-header{display:flex;align-items:flex-start;gap:14px;margin-bottom:14px}
.card-icon{width:52px;height:52px;border-radius:14px;display:flex;align-items:center;justify-content:center;font-size:26px;flex-shrink:0}
.card-title-area{flex:1;min-width:0}
.card-title{font-family:'Rubik',sans-serif;font-size:18px;font-weight:600;color:var(--text-primary);margin-bottom:2px}
.card-author{font-size:13px;color:var(--text-light)}
.card-desc{font-size:14.5px;color:var(--text-secondary);line-height:1.75;margin-bottom:14px}
.card-tags{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:14px}
.tag{padding:3px 11px;border-radius:100px;font-size:12px;font-weight:500}
.tag.default{background:linear-gradient(135deg,rgba(107,92,231,0.08),rgba(59,125,221,0.08));color:#2B59C3}
.tag.age{background:linear-gradient(135deg,rgba(0,191,166,0.1),rgba(0,201,219,0.1));color:#0D9488}
.tag.subject{background:linear-gradient(135deg,rgba(108,92,231,0.1),rgba(139,124,246,0.1));color:#6C5CE7}
.card-meta{display:flex;align-items:center;gap:16px;font-size:13px;color:var(--text-light)}
.meta-item{display:flex;align-items:center;gap:5px}
.card-bottom{padding:14px 24px;border-top:1px solid var(--border);display:flex;gap:10px;background:linear-gradient(180deg,#FAFBFE,#F6F8FC)}
.btn-take{flex:1;padding:11px;border-radius:var(--radius-sm);border:none;background:var(--grad-btn);color:#fff;font-family:'Heebo',sans-serif;font-size:14px;font-weight:600;cursor:pointer;transition:all .3s;display:flex;align-items:center;justify-content:center;gap:6px;box-shadow:0 2px 8px rgba(43,89,195,0.2)}
.btn-take:hover{background:var(--grad-btn-hover);box-shadow:var(--shadow-glow)}
.btn-comment{padding:11px 16px;border-radius:var(--radius-sm);border:1.5px solid var(--border);background:#fff;color:var(--text-secondary);font-family:'Heebo',sans-serif;font-size:14px;cursor:pointer;transition:all .25s;display:flex;align-items:center;gap:6px}
.btn-comment:hover{border-color:#8B7CF6;color:#6C5CE7}
.modal-overlay{position:fixed;inset:0;background:rgba(30,27,75,0.55);backdrop-filter:blur(6px);z-index:200;display:flex;align-items:center;justify-content:center;padding:24px;animation:fadeIn .2s}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
.modal{background:#fff;border-radius:var(--radius);width:100%;max-width:500px;max-height:85vh;overflow-y:auto;box-shadow:0 20px 60px rgba(30,27,75,0.2);animation:slideUp .35s cubic-bezier(.4,0,.2,1);border:1px solid rgba(107,92,231,0.1)}
@keyframes slideUp{from{transform:translateY(24px);opacity:0}to{transform:translateY(0);opacity:1}}
.modal-header{padding:24px 24px 0;display:flex;justify-content:space-between;align-items:center}
.modal-header h2{font-family:'Rubik',sans-serif;font-size:20px;font-weight:600}
.modal-close{width:34px;height:34px;border-radius:50%;border:none;background:var(--bg-primary);cursor:pointer;font-size:18px;color:var(--text-light);display:flex;align-items:center;justify-content:center}
.modal-close:hover{background:#E3E8F0;color:var(--text-primary)}
.modal-body{padding:20px 24px 24px}
.form-group{margin-bottom:16px}
.form-group label{display:block;font-size:14px;font-weight:600;color:var(--text-primary);margin-bottom:6px}
.form-group input,.form-group textarea{width:100%;padding:11px 14px;border-radius:var(--radius-sm);border:1.5px solid var(--border);font-family:'Heebo',sans-serif;font-size:15px;color:var(--text-primary);background:var(--bg-primary);transition:all .25s;direction:rtl}
.form-group input:focus,.form-group textarea:focus{outline:none;border-color:#8B7CF6;background:#fff;box-shadow:0 0 0 3px rgba(107,92,231,0.1)}
.form-group textarea{min-height:80px;resize:vertical}
.btn-submit{width:100%;padding:12px;border-radius:var(--radius-sm);border:none;background:var(--grad-btn);color:#fff;font-family:'Heebo',sans-serif;font-size:15px;font-weight:600;cursor:pointer;transition:all .3s;box-shadow:0 2px 8px rgba(43,89,195,0.2)}
.btn-submit:hover{background:var(--grad-btn-hover);box-shadow:var(--shadow-glow)}
.comments-list{margin-top:16px}
.comment-item{padding:14px;background:var(--bg-primary);border-radius:var(--radius-sm);margin-bottom:10px;border-right:3px solid #00BFA6}
.comment-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px}
.comment-author{font-weight:600;font-size:14px;color:var(--text-primary)}
.comment-date{font-size:12px;color:var(--text-light)}
.comment-text{font-size:14px;color:var(--text-secondary);line-height:1.65}
.admin-panel{max-width:1200px;margin:0 auto;padding:32px 24px 60px}
.admin-panel h2{font-family:'Rubik',sans-serif;font-size:24px;margin-bottom:24px;display:flex;align-items:center;gap:10px}
.admin-table{width:100%;border-collapse:collapse;background:#fff;border-radius:var(--radius);overflow:hidden;box-shadow:0 4px 16px rgba(30,27,75,0.08);border:1px solid var(--border)}
.admin-table th{background:var(--grad-header);color:#fff;padding:14px 18px;text-align:right;font-size:14px;font-weight:600}
.admin-table td{padding:14px 18px;border-bottom:1px solid var(--border);font-size:14px}
.admin-table tr:last-child td{border-bottom:none}
.admin-table tr:hover td{background:rgba(107,92,231,0.02)}
.count-badge{display:inline-flex;align-items:center;justify-content:center;min-width:34px;padding:4px 12px;border-radius:100px;font-weight:700;font-size:14px}
.count-badge.takes{background:linear-gradient(135deg,rgba(43,89,195,0.1),rgba(0,191,166,0.1));color:#2B59C3}
.count-badge.comments{background:linear-gradient(135deg,rgba(107,92,231,0.1),rgba(139,124,246,0.1));color:#6C5CE7}
.empty-state{text-align:center;padding:40px;color:var(--text-light);font-size:15px}
.pending-section{margin-bottom:32px}
.pending-section h3{font-family:'Rubik',sans-serif;font-size:18px;margin-bottom:16px;display:flex;align-items:center;gap:8px}
.pending-count{background:linear-gradient(135deg,rgba(245,158,11,0.15),rgba(239,68,68,0.1));color:#B45309;padding:2px 10px;border-radius:100px;font-size:13px;font-weight:700}
.pending-card{background:#fff;border:1px solid var(--border);border-radius:var(--radius-sm);padding:18px;margin-bottom:12px;border-right:4px solid #F59E0B;display:flex;align-items:flex-start;gap:14px}
.pending-card:hover{box-shadow:0 4px 16px rgba(30,27,75,0.08)}
.pending-icon{width:44px;height:44px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:22px;flex-shrink:0;background:#FEF3C7}
.pending-info{flex:1;min-width:0}
.pending-name{font-family:'Rubik',sans-serif;font-size:15px;font-weight:600}
.pending-meta{font-size:12px;color:var(--text-light);margin:2px 0 6px}
.pending-desc{font-size:13px;color:var(--text-secondary);line-height:1.6;margin-bottom:8px}
.pending-link{font-size:12px;color:var(--blue-mid);text-decoration:none;word-break:break-all}
.pending-link:hover{text-decoration:underline}
.pending-actions{display:flex;gap:8px;flex-shrink:0;align-self:center}
.btn-approve{padding:8px 16px;border-radius:var(--radius-sm);border:none;background:var(--grad-btn);color:#fff;font-family:'Heebo',sans-serif;font-size:13px;font-weight:600;cursor:pointer}
.btn-approve:hover{background:var(--grad-btn-hover);box-shadow:var(--shadow-glow)}
.btn-reject{padding:8px 16px;border-radius:var(--radius-sm);border:1.5px solid #FCA5A5;background:#FFF;color:#DC2626;font-family:'Heebo',sans-serif;font-size:13px;font-weight:600;cursor:pointer}
.btn-reject:hover{background:#FEF2F2}
.loading{text-align:center;padding:60px;color:var(--text-light);font-size:16px}
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(80px);background:var(--grad-header);color:#fff;padding:14px 28px;border-radius:100px;font-size:15px;font-weight:500;box-shadow:0 8px 32px rgba(30,27,75,0.25);z-index:300;transition:transform .35s cubic-bezier(.4,0,.2,1);pointer-events:none;border:1px solid rgba(255,255,255,0.1)}
.toast.show{transform:translateX(-50%) translateY(0)}
@media(max-width:768px){.hero h1{font-size:30px}.apps-grid{grid-template-columns:1fr}.stats-bar{gap:20px}.header-inner{padding:12px 16px}.hero{padding:36px 16px 16px}.logo-text{font-size:19px}.pending-card{flex-direction:column}.pending-actions{align-self:flex-start}}
</style>
</head>
<body>
<div id="app"><div class="loading">⏳ טוען את בית הבוטים...</div></div>
<div id="toast" class="toast"></div>

<script type="module">
import{initializeApp}from"https://www.gstatic.com/firebasejs/11.1.0/firebase-app.js";
import{getFirestore,collection,doc,getDocs,addDoc,updateDoc,deleteDoc,increment}from"https://www.gstatic.com/firebasejs/11.1.0/firebase-firestore.js";

const firebaseConfig={apiKey:"AIzaSyAmBoq2rjVIj6AfVi8t6mHIdNE5aSd1v5Y",authDomain:"beit-habotim.firebaseapp.com",projectId:"beit-habotim",storageBucket:"beit-habotim.firebasestorage.app",messagingSenderId:"738356294120",appId:"1:738356294120:web:d9c3606e9d93626e5d345d"};
const app=initializeApp(firebaseConfig);
const db=getFirestore(app);

let state={apps:[],user:null,filterSubject:'הכל',view:'catalog',modal:null};

// Load user from localStorage
try{const u=localStorage.getItem('bh-user');if(u)state.user=JSON.parse(u)}catch(e){}

async function loadApps(){
  const snap=await getDocs(collection(db,'apps'));
  state.apps=[];
  snap.forEach(d=>{state.apps.push({id:d.id,...d.data()})});
  render();
}

function getApproved(){return state.apps.filter(a=>a.status==='approved')}
function getPending(){return state.apps.filter(a=>a.status==='pending')}
function getFiltered(){
  let list=getApproved();
  if(state.filterSubject!=='הכל')list=list.filter(a=>a.subject===state.filterSubject);
  return list;
}

function showToast(m){const e=document.getElementById('toast');e.textContent=m;e.classList.add('show');setTimeout(()=>e.classList.remove('show'),2500)}

function render(){
  document.getElementById('app').innerHTML=renderHeader()+(state.view==='admin'?renderAdmin():renderCatalog());
  attachEvents();
}

function renderCatalog(){
  const approved=getApproved();
  const subjects=['הכל',...new Set(approved.map(a=>a.subject))];
  const filtered=getFiltered();
  const tT=approved.reduce((s,a)=>s+(a.takes||0),0);
  const tC=approved.reduce((s,a)=>s+(a.comments?a.comments.length:0),0);
  return '<div class="hero"><div class="hero-badge">✦ נבנה בידי מורים, עבור מורים</div><h1>בית הבוטים</h1><p>כלים חינוכיים דיגיטליים שנוצרו בידי מורים, עברו בדיקה, ומוכנים לשימוש בכיתה שלך</p><div class="stats-bar"><div class="stat-item"><div class="stat-num">'+approved.length+'</div><div class="stat-label">כלים בקטלוג</div></div><div class="stat-item"><div class="stat-num">'+tT+'</div><div class="stat-label">לקיחות</div></div><div class="stat-item"><div class="stat-num">'+tC+'</div><div class="stat-label">הערות מורים</div></div></div></div><div class="filters-section"><div class="filters-group"><span class="filters-label">📚 תחום דעת</span><div class="filters-row">'+subjects.map(s=>'<button class="filter-btn'+(state.filterSubject===s?' active':'')+'" data-subject="'+s+'">'+s+'</button>').join('')+'</div></div></div><div class="grid-section"><div class="apps-grid">'+filtered.map(a=>renderCard(a)).join('')+(filtered.length===0?'<div class="empty-state" style="grid-column:1/-1">לא נמצאו כלים</div>':'')+'</div></div>';
}

function renderCard(a){
  const comments=a.comments||[];
  const tags=a.tags||[];
  return '<div class="app-card"><div class="card-top"><div class="card-header"><div class="card-icon" style="background:'+(a.color||'#EDE9FE')+'">'+a.icon+'</div><div class="card-title-area"><div class="card-title">'+a.name+'</div><div class="card-author">'+a.author+'</div></div></div><div class="card-desc">'+a.desc+'</div><div class="card-tags"><span class="tag age">'+(a.age||'')+'</span><span class="tag subject">'+(a.subject||'')+'</span>'+tags.map(t=>'<span class="tag default">'+t+'</span>').join('')+'</div><div class="card-meta"><div class="meta-item">🔗 '+(a.takes||0)+' לקיחות</div><div class="meta-item">💬 '+comments.length+' הערות</div></div></div><div class="card-bottom"><button class="btn-take" data-id="'+a.id+'">🚀 קח אותי לאפליקציה</button><button class="btn-comment" data-id="'+a.id+'">💬 '+comments.length+'</button></div></div>';
}

function renderAdmin(){
  const pending=getPending();
  const approved=getApproved().sort((a,b)=>(b.takes||0)-(a.takes||0));
  let pendingHTML='';
  if(pending.length>0){
    pendingHTML='<div class="pending-section"><h3>⏳ ממתינים לאישור <span class="pending-count">'+pending.length+'</span></h3>'+pending.map(a=>'<div class="pending-card"><div class="pending-icon">'+a.icon+'</div><div class="pending-info"><div class="pending-name">'+a.name+'</div><div class="pending-meta">מאת '+a.author+' · '+(a.age||'')+' · '+(a.subject||'')+(a.email?' · '+a.email:'')+'</div><div class="pending-desc">'+a.desc+'</div><a class="pending-link" href="'+a.url+'" target="_blank">'+a.url+'</a></div><div class="pending-actions"><button class="btn-approve" data-approve="'+a.id+'">✅ אישור</button><button class="btn-reject" data-reject="'+a.id+'">❌ דחייה</button></div></div>').join('')+'</div>';
  }
  return '<div class="admin-panel"><h2>📊 דשבורד מנהל — בית הבוטים</h2>'+pendingHTML+'<h3 style="font-family:Rubik,sans-serif;font-size:18px;margin-bottom:16px">📋 כלים מאושרים ('+approved.length+')</h3><table class="admin-table"><thead><tr><th>#</th><th>שם הכלי</th><th>תחום</th><th>גיל</th><th>לקיחות</th><th>הערות</th></tr></thead><tbody>'+approved.map((a,i)=>'<tr><td>'+(i+1)+'</td><td><strong>'+a.icon+' '+a.name+'</strong><br><span style="color:var(--text-light);font-size:12px">'+a.author+'</span></td><td>'+(a.subject||'')+'</td><td>'+(a.age||'')+'</td><td><span class="count-badge takes">'+(a.takes||0)+'</span></td><td><span class="count-badge comments">'+(a.comments?a.comments.length:0)+'</span></td></tr>').join('')+'</tbody></table></div>';
}

function renderModal(){
  if(state.modal.type==='login'){
    return '<div class="modal-overlay" onclick="window._closeOverlay(event)"><div class="modal"><div class="modal-header"><h2>👋 כניסה לבית הבוטים</h2><button class="modal-close" onclick="window._closeModal()">✕</button></div><div class="modal-body"><div class="form-group"><label>שם מלא</label><input type="text" id="reg-name" placeholder="השם שלך"></div><div class="form-group"><label>כתובת מייל</label><input type="email" id="reg-email" placeholder="your@email.com" dir="ltr" style="text-align:left"></div><button class="btn-submit" onclick="window._doLogin()">כניסה</button></div></div></div>';
  }
  if(state.modal.type==='comment'){
    const a=state.apps.find(x=>x.id===state.modal.appId);
    if(!a)return'';
    const comments=a.comments||[];
    const commentsHTML=comments.length>0?'<div class="comments-list">'+comments.map(c=>'<div class="comment-item"><div class="comment-header"><span class="comment-author">'+c.author+'</span><span class="comment-date">'+c.date+'</span></div><div class="comment-text">'+c.text+'</div></div>').join('')+'</div>':'<div class="empty-state">אין עדיין הערות</div>';
    const formHTML=state.user?'<div style="margin-top:16px;padding-top:16px;border-top:1px solid var(--border)"><div class="form-group"><label>הערה חדשה</label><textarea id="comment-text" placeholder="שתפ/י את החוויה שלך..."></textarea></div><button class="btn-submit" data-addcomment="'+a.id+'">שלח הערה</button></div>':'<div style="margin-top:16px;padding:20px;background:rgba(107,92,231,0.04);border-radius:var(--radius-sm);text-align:center;font-size:14px;color:var(--text-secondary);border:1px solid rgba(107,92,231,0.1)">צריך להתחבר כדי להשאיר הערה<br><button class="btn-submit" style="max-width:200px;margin:12px auto 0" onclick="window._closeModal();window._openLogin();">כניסה</button></div>';
    return '<div class="modal-overlay" onclick="window._closeOverlay(event)"><div class="modal"><div class="modal-header"><h2>'+a.icon+' '+a.name+' — הערות</h2><button class="modal-close" onclick="window._closeModal()">✕</button></div><div class="modal-body">'+commentsHTML+formHTML+'</div></div></div>';
  }
  return'';
}

// === Global actions ===
window._openLogin=()=>{state.modal={type:'login'};render();setTimeout(()=>{const el=document.getElementById('reg-name');if(el)el.focus()},100)};
window._doLogin=()=>{const n=document.getElementById('reg-name')?.value.trim();const e=document.getElementById('reg-email')?.value.trim();if(!n||!e){showToast('נא למלא שם ומייל');return}state.user={name:n,email:e};localStorage.setItem('bh-user',JSON.stringify(state.user));state.modal=null;render();showToast('שלום '+n+'! 👋')};
window._logout=()=>{state.user=null;localStorage.removeItem('bh-user');render();showToast('להתראות! 👋')};
window._closeModal=()=>{state.modal=null;render()};
window._closeOverlay=e=>{if(e.target.classList.contains('modal-overlay'))window._closeModal()};
window._toggleView=()=>{
  if(state.view==='catalog'){
    const pw=prompt('הזן סיסמת מנהל:');
    if(pw!=='2026'){showToast('סיסמה שגויה');return}
  }
  state.view=state.view==='admin'?'catalog':'admin';render();
};

function attachEvents(){
  document.querySelectorAll('.filter-btn').forEach(b=>b.addEventListener('click',()=>{state.filterSubject=b.dataset.subject;render()}));
  document.querySelectorAll('.btn-take').forEach(b=>b.addEventListener('click',async()=>{
    const id=b.dataset.id;
    const a=state.apps.find(x=>x.id===id);if(!a)return;
    await updateDoc(doc(db,'apps',id),{takes:increment(1)});
    a.takes=(a.takes||0)+1;render();
    if(a.url&&a.url!=='#'){window.open(a.url,'_blank');showToast('🚀 נפתח: '+a.name)}else showToast('✅ נספר!')
  }));
  document.querySelectorAll('.btn-comment').forEach(b=>b.addEventListener('click',()=>{state.modal={type:'comment',appId:b.dataset.id};render()}));
  document.querySelectorAll('[data-addcomment]').forEach(b=>b.addEventListener('click',async()=>{
    const id=b.dataset.addcomment;const t=document.getElementById('comment-text')?.value.trim();
    if(!t){showToast('נא לכתוב הערה');return}
    const a=state.apps.find(x=>x.id===id);if(!a)return;
    const now=new Date();const d=now.getDate()+'/'+(now.getMonth()+1)+'/'+now.getFullYear();
    const comments=[...(a.comments||[]),{author:state.user.name,text:t,date:d}];
    await updateDoc(doc(db,'apps',id),{comments});
    a.comments=comments;state.modal={type:'comment',appId:id};render();showToast('ההערה נוספה! 💬')
  }));
  document.querySelectorAll('[data-approve]').forEach(b=>b.addEventListener('click',async()=>{
    const id=b.dataset.approve;
    await updateDoc(doc(db,'apps',id),{status:'approved'});
    const a=state.apps.find(x=>x.id===id);if(a)a.status='approved';
    render();showToast('✅ אושר!')
  }));
  document.querySelectorAll('[data-reject]').forEach(b=>b.addEventListener('click',async()=>{
    if(!confirm('למחוק את ההגשה הזו?'))return;
    const id=b.dataset.reject;
    await deleteDoc(doc(db,'apps',id));
    state.apps=state.apps.filter(x=>x.id!==id);
    render();showToast('❌ נדחה')
  }));
}

// Init
loadApps();
</script>
</body>
</html>
